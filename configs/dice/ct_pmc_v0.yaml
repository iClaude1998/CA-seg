datasets:
  size:
  modality: "."
  organ: 
    - "left\\+lung"
    - "right\\+lung"
  batch_size: 8
  root_dir: "/home/a1233646/ai_studio/datasource/medidata_backend/mediseg/bioparse/COVID19_singleCT"
  name: "bioparse_seg2" # 
  train_rate: 1.0
  resize: False
  annotation_name: "annotation_pmc.csv"
  cbm_dir: 'cbm_pmc'
  norm: None
  clamp: False
  train:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "train"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.size}"
    resize: "${datasets.resize}"
    annotation_name: "${datasets.annotation_name}"
    cbm_dir: "${datasets.cbm_dir}"
    norm: "${datasets.norm}"
    clamp: "${datasets.clamp}"



model:
  clip:
    pretrain: "Pubmedclip" # Pubmedclip, MedICaT, ViT-B-32
    outlayers: 
      - 3
      - 7
      - 11
    inter_mode: False
    proj_patch: True
  diffusion:
    version: "v0"
    image_size: 224
    in_channels: 3 # 4 for ISIC
    num_channels: 128
    out_channels: 1
    num_res_blocks: 2
    attention_resolutions: "16"
    dropout: 0.0
    channel_mult: ""
    num_classes: # set None for avoid label embeddings (why we have it, strange ???)
    use_checkpoint: True
    use_fp16: False
    num_heads: 1
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: -1
    resblock_updown: False
    use_new_attention_order: False


trainer:
  gt_type: "sdf_map" # sdf_map, mask
  learning_rate: 1.0e-4
  output: "output_logs" # experiments/exp_name/logs 
  use_ema: False
  checkpoint_name:  "experiments/dice/bioparse_seg2/radiography_pmc_v0/checkpoints/best.pth" # the name of the loaded checkpoint checkpoint_ep100.pth
  num_epochs: 100
  save_interval: 1
  with_codition: True
  gradient_accumulation_steps: 1
  clip_grads:


log_method: "tensorboard" # wandb, tensorboard