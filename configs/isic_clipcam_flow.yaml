model:
  clip:
    pretrain: "Pubmedclip" # Pubmedclip, MedICaT, ViT-B-32
    outlayers: 
      - 3
      - 7
      - 11
  diffusion:
    version: "v2"
    image_size: 224
    in_channels: 1    # 1 for CAM input only and image input only as condition
    num_channels: 128
    out_channels: 1
    channels_clip: 512
    num_res_blocks: 2
    attention_resolutions: "16"
    dropout: 0.0
    channel_mult: ""
    use_checkpoint: False
    use_fp16: False
    num_heads: 1
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: -1
    clip_allignment: # set to None, linear or linear_gelu 

trainer:
  gt_type: "sdf_map" # sdf_map, mask
  learning_rate: 1.0e-4
  output: "output_logs" # experiments/exp_name/logs 
  use_ema: False
  checkpoint_name: # the name of the loaded checkpoint
  num_timesteps: 1000
  num_iterations: 100000
  save_interval: 100

log_method: "tensorboard" # wandb, tensorboard