datasets:
  name: "bioparse_amos22"
  modality: "MRI"
  organ: "liver"
  root_dir: "/home/yliu/datasets/mediseg/bioparse/amos22"
  train_rate: 1.0
  batch_size: 48
  image_size: 
    - 224
    - 224
  featuremap_size: 7
  gcam_dir: "gcams"
  train:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "crop_train"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.image_size}"
    featuremap_size: "${datasets.featuremap_size}"
    gcam_dir: "${datasets.gcam_dir}"
  # val:
  #   name: "${datasets.name}"
  #   modality: "${datasets.modality}"
  #   organ: "${datasets.organ}"
  #   root_dir: "${datasets.root_dir}"
  #   split: "crop_val"
  #   train_rate: "${datasets.train_rate}"
  #   image_size: "${datasets.image_size}"
  #   featuremap_size: "${datasets.featuremap_size}"
  #   gcam_dir: "${datasets.gcam_dir}"
  test:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "crop_test"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.image_size}"
    featuremap_size: "${datasets.featuremap_size}"
    gcam_dir: "${datasets.gcam_dir}"
 

model:
  clip:
    pretrain: "BiomedCLIP"
    num_concepts: 128
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    no_proj: True
    task: 'biomed_weakly'
    inter_mode: False



trainer:
  learning_rate: 1.0e-3
  output: "output_logs" # experiments/exp_name/logs 
  use_ema: False
  checkpoint_name: "best.pth" # the name of the loaded checkpoint "best.pth"
  num_epoch: 100
  save_interval: 20
  valiation_interval: 1
  gamma: 0.98
  with_sigmoid: True
  gradient_accumulation_steps: 1
  clip_grads:


log_method: "wandb" # wandb, tensorboard

cbm_produce:
  train_dir: "${datasets.root_dir}/${datasets.modality}/train_cbm"
  val_dir:
  test_dir: "${datasets.root_dir}/${datasets.modality}/test_cbm"