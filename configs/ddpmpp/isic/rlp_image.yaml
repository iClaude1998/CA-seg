model:
  clip:
    pretrain: "Pubmedclip" # Pubmedclip, MedICaT, ViT-B-32
    outlayers: 
      - 11
    inter_mode: False
  diffusion:
    version: "v1"
    image_size: 224
    in_channels: 2 # 4 for ISIC
    num_channels: 128
    out_channels: 2
    num_res_blocks: 2
    condition_channels: 3
    attention_resolutions: "16"
    dropout: 0.0
    channel_mult: ""
    num_classes: # set None for avoid label embeddings (why we have it, strange ???)
    use_checkpoint: True
    use_fp16: False
    num_heads: 1
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: -1
    resblock_updown: False
    use_new_attention_order: False


trainer:
  gt_type: "sdf_map" # sdf_map, mask
  learning_rate: 1.0e-4
  output: "output_logs" # experiments/exp_name/logs 
  use_ema: False
  checkpoint_name: # the name of the loaded checkpoint
  num_timesteps: 4000
  num_iterations: 100000
  save_interval: 100
  start_point: "LRP"
  gradient_accumulation_steps: 1
  clip_grads:

log_method: "tensorboard" # wandb, tensorboard