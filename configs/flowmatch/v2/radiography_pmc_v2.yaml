datasets:
  size:
  modality: "Normal"
  organ: 
    - "left\\+lung"
    - "right\\+lung"
  batch_size: 4
  root_dir: "/home/a1233646/ai_studio/datasource/medidata_backend/mediseg/bioparse/Radiography"
  name: "bioparse_seg2" # "bioparse_image" "bioparse_featuremap"
  train_rate: 0.8
  resize: True
  annotation_name: "annotation_pmc.csv"
  cbm_dir: 'cbm_pmc'
  norm: minmax
  clamp: True
  train:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "train"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.size}"
    resize: "${datasets.resize}"
    annotation_name: "${datasets.annotation_name}"
    cbm_dir: "${datasets.cbm_dir}"
    norm: "${datasets.norm}"
    clamp: "${datasets.clamp}"
  val:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "val"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.size}"
    resize: "${datasets.resize}"
    annotation_name: "${datasets.annotation_name}"
    cbm_dir: "${datasets.cbm_dir}"
    norm: "${datasets.norm}"
    clamp: "${datasets.clamp}"
  test:
    name: "${datasets.name}"
    modality: "${datasets.modality}"
    organ: "${datasets.organ}"
    root_dir: "${datasets.root_dir}"
    split: "test"
    train_rate: "${datasets.train_rate}"
    image_size: "${datasets.size}"
    resize: "${datasets.resize}"
    annotation_name: "${datasets.annotation_name}"
    cbm_dir: "${datasets.cbm_dir}"
    norm: "${datasets.norm}"
    clamp: "${datasets.clamp}"


model:
  clip:
    pretrain: "Pubmedclip" # Pubmedclip, MedICaT, ViT-B-32
    outlayers: 
      - 3
      - 7
      - 11
    inter_mode: False
    proj_patch: True
  diffusion:
    version: "v2"
    image_size: 224
    in_channels: 5    # 1 for CAM input only and image input only as condition
    num_channels: 128
    out_channels: 1
    channels_clip: 512
    num_res_blocks: 2
    attention_resolutions: "16"
    dropout: 0.0
    channel_mult: ""
    use_checkpoint: True
    use_fp16: False
    num_heads: 1
    num_head_channels: -1
    num_heads_upsample: -1
    use_scale_shift_norm: -1
    clip_allignment: # set to None, linear or linear_gelu 

trainer:
  gt_type: "sdf_map" # sdf_map, mask
  learning_rate: 1.0e-4
  output: "output_logs" # experiments/exp_name/logs 
  use_ema: False
  checkpoint_name: "best.pth" # the name of the loaded checkpoint
  num_timesteps: 1000
  num_iterations: 100000
  save_interval: 100
  start_point: "all" 
  gradient_accumulation_steps: 1
  clip_grads:

log_method: "tensorboard" # wandb, tensorboard